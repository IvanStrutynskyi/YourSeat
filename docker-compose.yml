version: "3.9"

services:
  web:
    build: .
    container_name: yourseat-web
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-yourseat-secret-key}
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/instance/yourseat.db}
      FLASK_DEBUG: ${FLASK_DEBUG:-0}
      PORT: ${PORT:-5000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_TLS: ${SMTP_USE_TLS:-1}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-0}
      MAIL_FROM: ${MAIL_FROM:-noreply@yourseat.local}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://127.0.0.1:5000}
      RESTAURANT_NOTIFICATION_EMAIL: ${RESTAURANT_NOTIFICATION_EMAIL:-restaurant@example.com}
    volumes:
      - ./instance:/app/instance
    restart: unless-stopped
